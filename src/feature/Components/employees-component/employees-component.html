<div class="card" *ngIf="IsDefaultView">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span class="fw-bold">Employees Details</span>

    <!-- <mat-form-field appearance="outline">
      <input matInput [matDatepicker]="picker" [(ngModel)]="fromDate">
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field> -->
    <div></div>

    <button type="button" class="btn btn-sm btn-primary" (click)="OpenAddEmployeeForm()">Add</button>
  </div>

  <div class="card-body">
    <div class="row border border-solid">
      <table mat-table [dataSource]="employeesData" class="mat-elevation-z8">

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button color="primary" (click)="Edit(row.id)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="Delete(row.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="firstName">
          <th mat-header-cell *matHeaderCellDef>Firstname</th>
          <td mat-cell *matCellDef="let row">{{ row.firstName }}</td>
        </ng-container>

        <ng-container matColumnDef="lastName">
          <th mat-header-cell *matHeaderCellDef>Lastname</th>
          <td mat-cell *matCellDef="let row">{{ row.lastName }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let row">{{ row.email }}</td>
        </ng-container>

        <ng-container matColumnDef="salary">
          <th mat-header-cell *matHeaderCellDef>Salary</th>
          <td mat-cell *matCellDef="let row">{{ row.salary }}</td>
        </ng-container>

        <ng-container matColumnDef="department">
          <th mat-header-cell *matHeaderCellDef>Department</th>
          <td mat-cell *matCellDef="let row">{{ row.department }}</td>
        </ng-container>

        <ng-container matColumnDef="createdDate">
          <th mat-header-cell *matHeaderCellDef>Created Date</th>
          <td mat-cell *matCellDef="let row">{{ row.createdDate }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons>
      </mat-paginator>
    </div>
  </div>
</div>

<div class="card" *ngIf="!IsDefaultView">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span class="fw-bold">{{HeaderText}}</span>
    <button type="button" class="btn btn-sm btn-primary" (click)="toggleIsDefaultVies()">X</button>
  </div>
  <div class="card-body">
    

    <form [formGroup]="employeeForm">

      <div class="row">
        <div class="col-sm-12 col-md-6 col-lg-6">
          <div class="mb-3">
            <label>First Name</label>
            <input type="text" class="form-control" formControlName="firstName" />
            <!-- <small class="text-danger" *ngIf="form.firstName.touched && form.firstName.invalid">
              First Name is required
            </small> -->
          </div>
        </div>
        <div class="col-sm-12 col-md-6 col-lg-6">
          <div class="mb-3">
            <label>Last Name</label>
            <input type="text" class="form-control" formControlName="lastName" />
            <!-- <small class="text-danger" *ngIf="form.lastName.touched && form.lastName.invalid">
              Last Name is required
            </small> -->
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 col-md-6 col-lg-6">
          <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" formControlName="email" />
            <!-- <small class="text-danger" *ngIf="form.email.touched && form.email.invalid">
              Valid Email is required
            </small> -->
          </div>
        </div>
        <div class="col-sm-12 col-md-6 col-lg-6">
          <div class="mb-3">
            <label>Salary</label>
            <input type="number" class="form-control" formControlName="salary" />
            <!-- <small class="text-danger" *ngIf="form.salary.touched && form.salary.invalid">
              Salary must be greater than 0
            </small> -->
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 col-md-6 col-lg-6">
          <div class="mb-3">
            <label>Department</label>
            <select class="form-control" formControlName="departmentId">
              <option value="">Select Department</option>
              <option value="1000">HR</option>
              <option value="1002">IT</option>
              <option value="1003">Finance</option>
            </select>
            <!-- <small class="text-danger" *ngIf="form.departmentId.touched && form.departmentId.invalid">
              Department is required
            </small> -->
          </div>
        </div>
        <div class="col-sm-12 col-md-6 col-lg-6">
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" formControlName="isActive" />
            <label class="form-check-label">Is Active</label>
          </div>

          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" formControlName="isDeleted" />
            <label class="form-check-label">Is Deleted</label>
          </div>
        </div>
      </div>

      <div class="" *ngIf="ButtonText == 'Insert'">
        <button class="btn btn-primary" (click)="Insert()">Insert</button>
      </div>
      
      <div class="" *ngIf="ButtonText == 'Update'">
        <button type="button" class="btn btn-primary">Update</button>
      </div>
    </form>
  </div>
</div>
